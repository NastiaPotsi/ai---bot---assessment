services:
  mongo:
    image: mongo:7
    container_name: engineering-service-desk-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build: .
    container_name: engineering-service-desk-api
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8001:8000"
    restart: on-failure
    environment:
      APP_NAME: Engineering Service Desk Chatbot
      ENVIRONMENT: docker
      MONGO_URI: mongodb://mongo:27017
      MONGO_DATABASE: engineering_service_desk
      LLM_PROVIDER: ${LLM_PROVIDER:-azure}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o-mini}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-12-01-preview}
      DUPLICATE_SECRET: ${DUPLICATE_SECRET:-change-this-secret-in-real-environments}
      PROMPT_CONFIG_PATH: config/prompts.yaml

volumes:
  mongo-data:
